<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0e0c0a"/>

  <!-- Subtle top border accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="#b8923a"/>

  <!-- Left accent bar -->
  <rect x="80" y="120" width="3" height="390" fill="#2e2820"/>

  <!-- Main title -->
  <text
    x="120"
    y="260"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="80"
    font-weight="700"
    fill="#b8923a"
    letter-spacing="-1"
  >Kozy ESO PvP Builds</text>

  <!-- Tagline -->
  <text
    x="120"
    y="320"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="22"
    fill="#8a7f70"
    letter-spacing="3"
  >OPTIMIZED BUILDS · ROTATION GUIDES · ESO PVP</text>

  <!-- Divider line -->
  <rect x="120" y="360" width="500" height="1" fill="#2e2820"/>

  <!-- Sub-tagline -->
  <text
    x="120"
    y="400"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="28"
    font-style="italic"
    fill="#e8e0d0"
    opacity="0.7"
  >For players who want to understand why a build works.</text>

  <!-- Bottom URL -->
  <text
    x="120"
    y="520"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="18"
    fill="#7a5f25"
    letter-spacing="1"
  >kozy-eso-pvp-builds.netlify.app</text>
</svg>
