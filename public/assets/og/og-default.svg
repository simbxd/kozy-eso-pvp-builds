<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#09090f"/>

  <!-- Subtle glow -->
  <radialGradient id="glow" cx="50%" cy="0%" r="60%">
    <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#09090f" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="#8b5cf6"/>

  <!-- Logo mark -->
  <rect x="80" y="180" width="48" height="48" rx="10" fill="#8b5cf6"/>
  <text x="104" y="213" font-family="'Cormorant Garamond', Georgia, serif" font-size="28" font-weight="700" fill="#fff" text-anchor="middle">K</text>

  <!-- Main title -->
  <text
    x="148"
    y="218"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="52"
    font-weight="700"
    fill="#ede8ff"
    letter-spacing="-0.5"
  >Kozy ESO PvP Builds</text>

  <!-- Tagline -->
  <text
    x="80"
    y="290"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="18"
    fill="#6b6585"
    letter-spacing="3"
  >OPTIMIZED BUILDS · ROTATION GUIDES · ESO PVP</text>

  <!-- Divider -->
  <rect x="80" y="330" width="420" height="1" fill="#1e1c2e"/>

  <!-- Sub-tagline -->
  <text
    x="80"
    y="375"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="26"
    font-style="italic"
    fill="#ede8ff"
    opacity="0.5"
  >For players who want to understand why a build works.</text>

  <!-- Bottom URL -->
  <text
    x="80"
    y="510"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="16"
    fill="#6d28d9"
    letter-spacing="1"
  >kozy-eso-pvp-builds.pages.dev</text>
</svg>
