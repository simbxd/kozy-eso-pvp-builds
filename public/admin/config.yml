backend:
  name: github
  repo: simbxd/kozy-eso-pvp-builds
  branch: main
  base_url: https://kozy-eso-oauth.simbad14100.workers.dev

publish_mode: editorial_workflow

media_folder: public/assets/og
public_folder: /assets/og

# ── Collections ───────────────────────────────────────────────────────────────
# AUTO-GENERATED by scripts/gen-decap-config.mjs — do not edit manually.
# Run: npm run fetch:eso && npm run gen:decap

collections:

  # ── Builds ──────────────────────────────────────────────────────────────────
  - name: builds
    label: Builds
    folder: src/content/builds
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:

      # Core metadata
      - { name: title,      label: Title,      widget: string }
      - name: class
        label: Class
        widget: select
        options: [Dragonknight, Sorcerer, Nightblade, Templar, Warden, Necromancer, Arcanist, Werewolf]
      - name: role
        label: Role
        widget: select
        options: [DPS, Healer, Tank]
      - name: resource
        label: Resource
        widget: select
        options: [Stamina, Magicka, Hybrid]
      - name: gamemode
        label: Gamemode
        widget: select
        multiple: true
        options: ["Cyrodiil / Imperial City", Battlegrounds, Duels]
      - { name: patch,      label: Patch,       widget: string,  hint: "ex: U50" }
      - { name: author,     label: Author,      widget: string,  default: "Kozy", required: false }
      - name: difficulty
        label: Difficulty
        widget: select
        options: [Beginner, Intermediate, Advanced]
      - { name: featured,   label: Featured,    widget: boolean, default: false }
      - name: race
        label: Race
        widget: select
        required: false
        hint: "Race recommandée pour ce build"
        options:
          - { label: "Altmer — Aldmeri Dominion", value: "altmer" }
          - { label: "Argonian — Ebonheart Pact", value: "argonian" }
          - { label: "Bosmer — Aldmeri Dominion", value: "bosmer" }
          - { label: "Breton — Daggerfall Covenant", value: "breton" }
          - { label: "Dunmer — Ebonheart Pact", value: "dunmer" }
          - { label: "Imperial — Other", value: "imperial" }
          - { label: "Khajiit — Aldmeri Dominion", value: "khajiit" }
          - { label: "Nord — Ebonheart Pact", value: "nord" }
          - { label: "Orc — Daggerfall Covenant", value: "orc" }
          - { label: "Redguard — Daggerfall Covenant", value: "redguard" }
      - { name: summary,    label: Summary,     widget: text }
      - { name: video_id,   label: Video Gameplay (YouTube ID), widget: string, required: false, hint: "ID only — ex: dQw4w9WgXcQ" }

      # Sets
      - name: sets
        label: Sets
        widget: list
        field:
          name: set
          label: Set
          widget: select
