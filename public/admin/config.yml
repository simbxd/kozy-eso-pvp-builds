      # Stats targets
      - name: stats
        label: Stats Targets
        widget: object
        required: false
        fields:
          - name: health
            label: Health
            widget: object
            fields:
              - { name: target, label: Target, widget: number, required: false }
              - { name: note,   label: Note,   widget: string, required: false }
          - name: magicka
            label: Magicka
            widget: object
            fields:
              - { name: target, label: Target, widget: number, required: false }
              - { name: note,   label: Note,   widget: string, required: false }
          - name: stamina
            label: Stamina
            widget: object
            fields:
              - { name: target, label: Target, widget: number, required: false }
              - { name: note,   label: Note,   widget: string, required: false }

      # Champion Points
      - name: champion_points
        label: Champion Points
        widget: object
        required: false
        fields:
          - name: warfare
            label: Warfare
            widget: list
            fields:
              - { name: star,     label: Star,     widget: string }
              - { name: points,   label: Points,   widget: number }
              - { name: priority, label: Priority, widget: number }
          - name: fitness
            label: Fitness
            widget: list
            fields:
              - { name: star,     label: Star,     widget: string }
              - { name: points,   label: Points,   widget: number }
              - { name: priority, label: Priority, widget: number }

      # Consumables
      - name: consumables
        label: Consumables
        widget: object
        required: false
        fields:
          - name: food
            label: Food
            widget: object
            required: false
            fields:
              - { name: name,  label: Name,       widget: string, required: false }
              - { name: stats, label: Stats,       widget: string, required: false }
              - { name: note,  label: Note,        widget: string, required: false }
              - { name: alt,   label: Alternative, widget: string, required: false }
          - name: potion
            label: Potion
            widget: object
            required: false
            fields:
              - { name: name, label: Name,        widget: string, required: false }
              - { name: note, label: Note,        widget: string, required: false }
              - name: ingredients
                label: Ingredients
                widget: list
                required: false
          - name: poison
            label: Poison
            widget: object
            required: false
            fields:
              - { name: name, label: Name, widget: string, required: false }
              - { name: note, label: Note, widget: string, required: false }
          - name: mundus
            label: Mundus Stone
            widget: object
            required: false
            fields:
              - { name: stone,  label: Stone,  widget: string, required: false }
              - { name: effect, label: Effect, widget: string, required: false }
              - { name: note,   label: Note,   widget: string, required: false }
              - name: alt
                label: Alternative Stone
                widget: object
                required: false
                fields:
                  - { name: stone,  label: Stone,  widget: string, required: false }
                  - { name: effect, label: Effect, widget: string, required: false }
                  - { name: note,   label: Note,   widget: string, required: false }

