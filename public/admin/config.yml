backend:
  name: github
  repo: simbxd/kozy-eso-pvp-builds
  branch: main
  base_url: https://kozy-eso-oauth.simbad14100.workers.dev

media_folder: public/assets/og
public_folder: /assets/og

# ── Collections ───────────────────────────────────────────────────────────────

collections:

  # ── Builds ──────────────────────────────────────────────────────────────────
  - name: builds
    label: Builds
    folder: src/content/builds
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:

      # Core metadata
      - { name: title,      label: Title,      widget: string }
      - name: class
        label: Class
        widget: select
        options: [Dragonknight, Sorcerer, Nightblade, Templar, Warden, Necromancer, Arcanist]
      - name: role
        label: Role
        widget: select
        options: [DPS, Healer, Tank]
      - name: resource
        label: Resource
        widget: select
        options: [Stamina, Magicka, Hybrid]
      - name: gamemode
        label: Gamemode
        widget: select
        options: [PvP, PvE, Both]
      - { name: patch,      label: Patch,       widget: string,  hint: "ex: U50" }
      - { name: updatedAt,  label: Updated At,  widget: date,    required: false, format: YYYY-MM-DD }
      - name: difficulty
        label: Difficulty
        widget: select
        options: [Beginner, Intermediate, Advanced]
      - { name: featured,   label: Featured,    widget: boolean, default: false }
      - { name: summary,    label: Summary,     widget: text }
      - { name: pullquote,  label: Pull Quote,  widget: string,  required: false }

      # Sets & Skills (IDs only — JSON files must exist in src/content/sets/ and src/content/skills/)
      - name: sets
        label: Sets (IDs)
        widget: list
        hint: "IDs des fichiers JSON dans src/content/sets/ — ex: rallying-cry"

      - name: skills
        label: Skills
        widget: object
        fields:
          - name: bar1
            label: Bar I
            widget: list
            hint: "IDs des fichiers JSON dans src/content/skills/"
          - name: bar2
            label: Bar II
            widget: list
            hint: "IDs des fichiers JSON dans src/content/skills/"

      # Stats targets
      - name: stats
        label: Stats Targets
        widget: object
        required: false
        fields:
          - name: health
            label: Health
            widget: object
            fields:
              - { name: target, label: Target, widget: number }
              - { name: note,   label: Note,   widget: string, required: false }
          - name: magicka
            label: Magicka
            widget: object
            fields:
              - { name: target, label: Target, widget: number }
              - { name: note,   label: Note,   widget: string, required: false }
          - name: stamina
            label: Stamina
            widget: object
            fields:
              - { name: target, label: Target, widget: number }
              - { name: note,   label: Note,   widget: string, required: false }

      # Champion Points
      - name: champion_points
        label: Champion Points
        widget: object
        required: false
        fields:
          - name: warfare
            label: Warfare
            widget: list
            fields:
              - { name: star,     label: Star,     widget: string }
              - { name: points,   label: Points,   widget: number }
              - { name: priority, label: Priority, widget: number }
          - name: fitness
            label: Fitness
            widget: list
            fields:
              - { name: star,     label: Star,     widget: string }
              - { name: points,   label: Points,   widget: number }
              - { name: priority, label: Priority, widget: number }

      # Consumables
      - name: consumables
        label: Consumables
        widget: object
        required: false
        fields:
          - name: food
            label: Food
            widget: object
            fields:
              - { name: name,  label: Name,       widget: string }
              - { name: stats, label: Stats,       widget: string, required: false }
              - { name: note,  label: Note,        widget: string, required: false }
              - { name: alt,   label: Alternative, widget: string, required: false }
          - name: potion
            label: Potion
            widget: object
            fields:
              - { name: name, label: Name, widget: string }
              - { name: note, label: Note, widget: string, required: false }
              - name: ingredients
                label: Ingredients
                widget: list
                required: false
          - name: poison
            label: Poison
            widget: object
            required: false
            fields:
              - { name: name, label: Name, widget: string, required: false }
              - { name: note, label: Note, widget: string, required: false }
          - name: mundus
            label: Mundus Stone
            widget: object
            required: false
            fields:
              - { name: stone,  label: Stone,  widget: string }
              - { name: effect, label: Effect, widget: string, required: false }
              - { name: note,   label: Note,   widget: string, required: false }
              - name: alt
                label: Alternative Stone
                widget: object
                required: false
                fields:
                  - { name: stone,  label: Stone,  widget: string }
                  - { name: effect, label: Effect, widget: string, required: false }
                  - { name: note,   label: Note,   widget: string, required: false }

      # Gear Sheet
      - name: gear
        label: Gear Sheet
        widget: object
        required: false
        fields:
          - name: armor
            label: Armor
            widget: list
            fields:
              - { name: slot,   label: Slot,        widget: string }
              - name: type
                label: Weight
                widget: select
                options: [heavy, medium, light]
              - { name: item,   label: Item Name,   widget: string }
              - { name: setId,  label: Set ID,      widget: string }
              - { name: tier,   label: Tier,        widget: string, hint: "ex: 5/5" }
              - { name: trait,  label: Trait,       widget: string }
              - { name: enchant, label: Enchantment, widget: string }
          - name: jewelry
            label: Jewelry
            widget: list
            fields:
              - { name: slot,   label: Slot,        widget: string }
              - name: type
                label: Type
                widget: select
                options: [jewelry, mythic]
              - { name: item,   label: Item Name,   widget: string }
              - { name: setId,  label: Set ID,      widget: string }
              - { name: tier,   label: Tier,        widget: string }
              - { name: trait,  label: Trait,       widget: string }
              - { name: enchant, label: Enchantment, widget: string }
          - name: weapons
            label: Weapons
            widget: list
            fields:
              - { name: slot,     label: Slot,        widget: string }
              - { name: barLabel, label: Bar,         widget: string, hint: "BAR I ou BAR II" }
              - { name: item,     label: Item Name,   widget: string }
              - { name: setId,    label: Set ID,      widget: string }
              - { name: tier,     label: Tier,        widget: string }
              - { name: trait,    label: Trait,       widget: string }
              - { name: enchant,  label: Enchantment, widget: string }

  # ── Guides ──────────────────────────────────────────────────────────────────
  - name: guides
    label: Guides
    folder: src/content/guides
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { name: title,     label: Title,    widget: string }
      - { name: category,  label: Category, widget: string, hint: "ex: Mechanics, Builds, PvP" }
      - name: tags
        label: Tags
        widget: list
      - { name: published, label: Published, widget: date, format: YYYY-MM-DD }
      - { name: summary,   label: Summary,   widget: text }
      - { name: patch,     label: Patch,     widget: string, required: false, hint: "ex: U50" }
      - { name: readTime,  label: Read Time, widget: string, required: false, hint: "ex: 8 min" }
      - { name: body,      label: Content,   widget: markdown }
