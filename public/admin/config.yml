      # Stats targets
      - name: stats
        label: Stats Targets
        widget: object
        required: false
        fields:
          - name: health
            label: Health
            widget: object
            fields:
              - { name: target, label: Target, widget: number, required: false }
              - { name: note,   label: Note,   widget: string, required: false }
          - name: magicka
            label: Magicka
            widget: object
            fields:
              - { name: target, label: Target, widget: number, required: false }
              - { name: note,   label: Note,   widget: string, required: false }
          - name: stamina
            label: Stamina
            widget: object
            fields:
              - { name: target, label: Target, widget: number, required: false }
              - { name: note,   label: Note,   widget: string, required: false }

      # Champion Points
      - name: champion_points
        label: Champion Points
        widget: object
        required: false
        fields:
          - name: warfare
            label: Warfare
            widget: list
            fields:
              - name: star
                label: Star
                widget: select
                options:
                  - "Arcane Well"
                  - "Blessed"
                  - "Cleansing Revival"
                  - "Deadly Aim"
                  - "Duelist's Rebuff"
                  - "Elemental Aegis"
                  - "Elfborn"
                  - "Fighting Finesse"
                  - "Hardy"
                  - "Ironclad"
                  - "Master-at-Arms"
                  - "Piercing"
                  - "Reaving Blows"
                  - "Siphoning Spells"
                  - "Thaumaturge"
                  - "Tireless Discipline"
              - { name: points,   label: Points,   widget: number }
              - { name: priority, label: Priority, widget: number }
          - name: fitness
            label: Fitness
            widget: list
            fields:
              - name: star
                label: Star
                widget: select
                options:
                  - "Bloody Renewal"
                  - "Boundless Vitality"
                  - "Bracing Gusts"
                  - "Celerity"
                  - "Defiance"
                  - "Fortified"
                  - "Fortified Brass"
                  - "Hasty Retreat"
                  - "Hero's Rebuke"
                  - "Infused Weapon"
                  - "Juggernaut"
                  - "Mystic Tenacity"
                  - "Pain's Refuge"
                  - "Rejuvenation"
                  - "Slippery"
                  - "Sustained by Suffering"
              - { name: points,   label: Points,   widget: number }
              - { name: priority, label: Priority, widget: number }

      # Consumables
      - name: consumables
        label: Consumables
        widget: object
        required: false
        fields:
          - name: food
            label: Food
            widget: object
            required: false
            fields:
              - { name: name,  label: Name,       widget: string, required: false }
              - { name: stats, label: Stats,       widget: string, required: false }
              - { name: note,  label: Note,        widget: string, required: false }
              - { name: alt,   label: Alternative, widget: string, required: false }
          - name: potion
            label: Potion
            widget: object
            required: false
            fields:
              - { name: name, label: Name,        widget: string, required: false }
              - { name: note, label: Note,        widget: string, required: false }
              - name: ingredients
                label: Ingredients
                widget: list
                required: false
          - name: poison
            label: Poison
            widget: object
            required: false
            fields:
              - { name: name, label: Name, widget: string, required: false }
              - { name: note, label: Note, widget: string, required: false }
          - name: mundus
            label: Mundus Stone
            widget: object
            required: false
            fields:
              - { name: stone,  label: Stone,  widget: string, required: false }
              - { name: effect, label: Effect, widget: string, required: false }
              - { name: note,   label: Note,   widget: string, required: false }
              - name: alt
                label: Alternative Stone
                widget: object
                required: false
                fields:
                  - { name: stone,  label: Stone,  widget: string, required: false }
                  - { name: effect, label: Effect, widget: string, required: false }
                  - { name: note,   label: Note,   widget: string, required: false }

      # Gear Sheet
